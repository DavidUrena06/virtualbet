<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VirtualBet — Plinko</title>
  <link rel="stylesheet" href="../../css/main.css">
  <style>
    #plinkoCanvas {
      width: 100%;
      max-width: 420px;
      display: block;
      margin: 0 auto;
      border-radius: var(--radius-xl);
      background: var(--bg-card);
      border: 1px solid var(--border);
    }

    .bucket-row {
      display: flex;
      max-width: 420px;
      margin: 0 auto 1.5rem;
      gap: 3px;
    }
    .bucket {
      flex: 1;
      padding: 6px 2px;
      text-align: center;
      border-radius: var(--radius-sm);
      font-size: 0.72rem;
      font-weight: 700;
      transition: all 0.3s ease;
    }
    .bucket.hit {
      transform: scale(1.15);
      box-shadow: 0 0 12px currentColor;
    }

    .risk-btn {
      flex: 1;
      padding: 8px;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text-secondary);
      border-radius: var(--radius-md);
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s ease;
    }
    .risk-btn.selected {
      background: rgba(124,58,237,0.15);
      border-color: var(--purple);
      color: var(--purple-light);
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="./dashboard.html" class="navbar__logo">🎰 VirtualBet</a>
  <div class="navbar__nav"></div>  <!-- navbar.js lo llena automáticamente -->
  <div class="navbar__balance">🪙 <span id="navBalance">—</span></div>
</nav>

<main class="container page">
  <div class="game-area">

    <!-- Canvas del tablero -->
    <canvas id="plinkoCanvas" height="480"></canvas>

    <!-- Buckets con multiplicadores -->
    <div class="bucket-row" id="bucketRow"></div>

    <!-- Resultado -->
    <div class="result-display" id="resultDisplay" style="margin-bottom:1.5rem;">
      <div style="color:var(--text-muted);font-size:0.9rem;">Tirá la bola</div>
    </div>

    <!-- Controles -->
    <div class="bet-controls">

      <!-- Riesgo -->
      <div class="form-group">
        <label class="form-label">Nivel de riesgo</label>
        <div style="display:flex;gap:8px;">
          <button class="risk-btn selected" id="riskLow"  onclick="setRisk('low')">
            🟢 Bajo
          </button>
          <button class="risk-btn" id="riskMid"  onclick="setRisk('mid')">
            🟡 Medio
          </button>
          <button class="risk-btn" id="riskHigh" onclick="setRisk('high')">
            🔴 Alto
          </button>
        </div>
      </div>

      <!-- Apuesta -->
      <div class="form-group">
        <label class="form-label">Apuesta</label>
        <div class="input-group">
          <input class="form-input" type="number" id="betAmount"
                 min="1" max="10000" value="10" step="1">
          <span class="input-group__suffix">🪙</span>
        </div>
        <div class="multiplier-presets" style="margin-top:8px;">
          <button onclick="setBet(10)">10</button>
          <button onclick="setBet(50)">50</button>
          <button onclick="setBet(100)">100</button>
          <button onclick="setBet(500)">500</button>
          <button onclick="setHalfBet()">½</button>
          <button onclick="setMaxBet()">MAX</button>
        </div>
      </div>

      <button class="btn btn--orange btn--full btn--lg" id="dropBtn" onclick="dropBall()">
        🔵 Soltar bola
      </button>

    </div>
  </div>
</main>

<script src="../../js/api.js"></script>
<script src="../js/navbar.js"></script>
<script>
  requireLogin();

  let risk = 'low';
  let currentBalance = 0;
  let animRunning = false;

  const MULTIPLIERS = {
    low:  [5.6, 2.1, 1.1, 1.0, 0.5, 1.0, 1.1, 2.1, 5.6],
    mid:  [13, 3, 1.3, 0.7, 0.4, 0.7, 1.3, 3, 13],
    high: [29, 4, 1.5, 0.3, 0.2, 0.3, 1.5, 4, 29],
  };

  const BUCKET_COLORS = {
    low:  ['#10b981','#34d399','#6ee7b7','#a7f3d0','#6b7280','#a7f3d0','#6ee7b7','#34d399','#10b981'],
    mid:  ['#f59e0b','#fbbf24','#10b981','#6ee7b7','#6b7280','#6ee7b7','#10b981','#fbbf24','#f59e0b'],
    high: ['#ef4444','#f97316','#f59e0b','#6b7280','#374151','#6b7280','#f59e0b','#f97316','#ef4444'],
  };

  const canvas = document.getElementById('plinkoCanvas');
  const ctx    = canvas.getContext('2d');

  const ROWS = 16;
  const PEGS_PER_ROW = ROWS + 1;

  async function loadBalance() {
    try {
      const d = await VB.wallet.balance();
      currentBalance = parseFloat(d.wallet.balance);
      document.getElementById('navBalance').textContent =
        currentBalance.toLocaleString('es-CR', { minimumFractionDigits: 2 });
    } catch(e) {}
  }

  function setRisk(r) {
    risk = r;
    ['Low','Mid','High'].forEach(x => {
      document.getElementById('risk'+x).classList.toggle('selected', x.toLowerCase() === r);
    });
    renderBuckets();
    drawBoard();
  }

  function setBet(n) { document.getElementById('betAmount').value = Math.min(n, 10000); }
  function setHalfBet() {
    const c = parseFloat(document.getElementById('betAmount').value) || 10;
    setBet(Math.max(1, Math.floor(c / 2)));
  }
  function setMaxBet() { setBet(Math.min(currentBalance, 10000)); }

  // ── Dibuja el tablero de pegs ─────────────────────────────────────────────
  function drawBoard(ballX = null, ballY = null, trail = []) {
    const W = canvas.offsetWidth;
    const H = 480;
    canvas.width  = W * devicePixelRatio;
    canvas.height = H * devicePixelRatio;
    ctx.scale(devicePixelRatio, devicePixelRatio);
    ctx.clearRect(0, 0, W, H);

    const padX = 30, padY = 20;
    const gridW = W - padX * 2;
    const gridH = H - padY * 2 - 40;
    const rowH  = gridH / ROWS;

    // Dibuja pegs
    for (let row = 0; row < ROWS; row++) {
      const pegsInRow = row + 2;
      const startX = padX + (gridW - (pegsInRow - 1) * (gridW / ROWS)) / 2;
      const stepX  = gridW / ROWS;
      const y = padY + row * rowH + rowH / 2;

      for (let col = 0; col < pegsInRow; col++) {
        const x = startX + col * stepX;
        ctx.beginPath();
        ctx.arc(x, y, 4, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.25)';
        ctx.fill();
      }
    }

    // Dibuja trail de la bola
    trail.forEach((p, i) => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(124,58,237,${0.1 + 0.4 * (i / trail.length)})`;
      ctx.fill();
    });

    // Dibuja bola actual
    if (ballX !== null) {
      ctx.beginPath();
      ctx.arc(ballX, ballY, 8, 0, Math.PI * 2);
      const grad = ctx.createRadialGradient(ballX - 2, ballY - 2, 1, ballX, ballY, 8);
      grad.addColorStop(0, '#ffffff');
      grad.addColorStop(1, '#9f67f5');
      ctx.fillStyle = grad;
      ctx.fill();
    }
  }

  // ── Anima la trayectoria de la bola ──────────────────────────────────────
  function animateBall(path, bucketIndex, onDone) {
    const W   = canvas.offsetWidth;
    const H   = 480;
    const padX = 30, padY = 20;
    const gridW = W - padX * 2;
    const gridH = H - padY * 2 - 40;
    const rowH  = gridH / ROWS;

    // Calcula puntos de paso de la bola
    const waypoints = [];
    let col = 0; // empieza desde el top center

    // Start point (top center)
    waypoints.push({ x: W / 2, y: padY - 10 });

    for (let row = 0; row < ROWS; row++) {
      const pegsInRow = row + 2;
      const stepX  = gridW / ROWS;
      const startX = padX + (gridW - (pegsInRow - 1) * stepX) / 2;

      // Celda actual
      const goRight = path[row];
      col += goRight;

      // La bola cae al peg en [row][col] y luego al siguiente nivel
      const pegX = startX + col * stepX;
      const pegY = padY + row * rowH + rowH / 2;

      // Punto de rebote en el peg
      waypoints.push({ x: pegX, y: pegY - 12 });
      // Punto debajo del peg (inicio de caída)
      waypoints.push({ x: pegX + (goRight ? 12 : -12), y: pegY + 12 });
    }

    // Punto final en el bucket
    const bucketsN = MULTIPLIERS[risk].length;
    const bucketW  = (W - padX * 2) / bucketsN;
    const finalX   = padX + bucketIndex * bucketW + bucketW / 2;
    waypoints.push({ x: finalX, y: H - 50 });

    // Anima entre waypoints
    let wpIdx  = 0;
    let t      = 0;
    const trail = [];

    function step() {
      if (wpIdx >= waypoints.length - 1) {
        onDone();
        return;
      }

      const from = waypoints[wpIdx];
      const to   = waypoints[wpIdx + 1];
      const speed = 0.06;
      t += speed;

      if (t >= 1) { t = 0; wpIdx++; }

      const bx = from.x + (to.x - from.x) * t;
      const by = from.y + (to.y - from.y) * t;

      trail.push({ x: bx, y: by });
      if (trail.length > 12) trail.shift();

      drawBoard(bx, by, trail);
      requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  // ── Renders buckets ───────────────────────────────────────────────────────
  function renderBuckets(hitIdx = null) {
    const mults  = MULTIPLIERS[risk];
    const colors = BUCKET_COLORS[risk];
    const row    = document.getElementById('bucketRow');
    row.innerHTML = mults.map((m, i) => `
      <div class="bucket ${hitIdx === i ? 'hit' : ''}"
           style="background:${colors[i]}22;color:${colors[i]};border:1px solid ${colors[i]}55;">
        ${m}x
      </div>
    `).join('');
  }

  // ── Suelta la bola ────────────────────────────────────────────────────────
  async function dropBall() {
    if (animRunning) return;
    const betAmount = parseFloat(document.getElementById('betAmount').value);

    if (!betAmount || betAmount < 1) { showToast('Apuesta mínima: 1 moneda', 'error'); return; }
    if (betAmount > currentBalance)  { showToast('Saldo insuficiente', 'error'); return; }

    const dropBtn = document.getElementById('dropBtn');
    dropBtn.disabled = true;
    dropBtn.textContent = 'Cayendo...';
    animRunning = true;

    try {
      const data = await api.post('/games/plinko', { betAmount, risk });

      // Anima con el path real del servidor
      animateBall(data.path, data.bucketIndex, () => {
        // Al terminar la animación → muestra resultado
        renderBuckets(data.bucketIndex);

        const resultEl = document.getElementById('resultDisplay');
        if (data.result === 'WIN') {
          resultEl.className = 'result-display result-display--win';
          resultEl.innerHTML = `
            <div class="result-display__number" style="color:var(--green-neon);">
              ${data.multiplier.toFixed(2)}x
            </div>
            <div class="result-display__label">
              +${data.payout.toFixed(2)} 🪙
            </div>
          `;
          showToast(`¡Ganaste ${data.payout.toFixed(2)} 🪙 x${data.multiplier.toFixed(2)}!`, 'success');
        } else {
          resultEl.className = 'result-display result-display--loss';
          resultEl.innerHTML = `
            <div class="result-display__number" style="color:var(--red-accent);">
              ${data.multiplier.toFixed(2)}x
            </div>
            <div class="result-display__label">
              Perdiste ${betAmount.toFixed(2)} 🪙
            </div>
          `;
          showToast('Sin suerte esta vez. ¡Intentá de nuevo!', 'error');
        }

        currentBalance = data.newBalance;
        document.getElementById('navBalance').textContent =
          currentBalance.toLocaleString('es-CR', { minimumFractionDigits: 2 });

        animRunning = false;
        dropBtn.disabled = false;
        dropBtn.textContent = '🔵 Soltar bola';

        // Limpia el resaltado de bucket después de un rato
        setTimeout(() => renderBuckets(), 2500);
      });

    } catch(err) {
      showToast(err.message, 'error');
      animRunning = false;
      dropBtn.disabled = false;
      dropBtn.textContent = '🔵 Soltar bola';
    }
  }

  loadBalance();
  renderBuckets();
  drawBoard();
</script>
</body>
</html>

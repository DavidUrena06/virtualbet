<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VirtualBet — Amigos</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .tab-bar { display:flex; border-bottom:1px solid var(--border); margin-bottom:1.25rem; overflow-x:auto; }
    .tab-btn {
      padding:10px 20px; font-size:0.9rem; font-weight:600;
      color:var(--text-secondary); cursor:pointer;
      border-bottom:2px solid transparent; transition:all 0.15s;
      background:none; border-top:none; border-left:none; border-right:none;
      font-family:inherit; white-space:nowrap; flex-shrink:0;
    }
    .tab-btn.active { color:var(--purple-light); border-bottom-color:var(--purple-light); }

    .friend-card {
      display:flex; align-items:center; justify-content:space-between;
      background:var(--bg-card); border:1px solid var(--border);
      border-radius:var(--radius-lg); padding:0.9rem 1.1rem;
      margin-bottom:0.6rem; gap:8px; flex-wrap:wrap;
    }
    .avatar-sm {
      width:40px; height:40px; border-radius:50%;
      background:var(--bg-secondary); border:1px solid var(--border);
      display:flex; align-items:center; justify-content:center;
      font-size:1.3rem; flex-shrink:0;
    }

    .search-results {
      background:var(--bg-card); border:1px solid var(--border);
      border-radius:var(--radius-lg); overflow:hidden;
      margin-top:4px; position:absolute;
      width:100%; z-index:100;
      box-shadow:0 8px 24px rgba(0,0,0,0.4);
    }
    .search-result-row {
      display:flex; align-items:center; justify-content:space-between;
      padding:10px 14px; border-bottom:1px solid var(--border);
      transition:background 0.1s; gap:8px; flex-wrap:wrap;
    }
    .search-result-row:last-child { border-bottom:none; }
    .search-result-row:hover { background:var(--bg-card-hover); }

    .rel-badge {
      font-size:0.72rem; font-weight:700; padding:3px 9px;
      border-radius:99px; white-space:nowrap;
    }
    .rel-friends       { background:rgba(0,255,136,0.12); color:var(--green-neon); }
    .rel-pending-sent  { background:rgba(245,158,11,0.12); color:var(--gold); }
    .rel-pending-recv  { background:rgba(124,58,237,0.15); color:var(--purple-light); }

    .request-card {
      background:var(--bg-card); border:1px solid var(--border);
      border-radius:var(--radius-lg); padding:0.9rem 1.1rem;
      margin-bottom:0.6rem; display:flex; align-items:center;
      justify-content:space-between; gap:8px; flex-wrap:wrap;
    }
    .request-actions { display:flex; gap:6px; flex-shrink:0; }

    .empty-state {
      text-align:center; padding:2.5rem 1rem; color:var(--text-muted);
    }
    .empty-state .icon { font-size:2.5rem; margin-bottom:0.5rem; }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="./dashboard.html" class="navbar__logo">🎰 VirtualBet</a>
  <div class="navbar__nav"></div>
  <div class="navbar__balance">🪙 <span id="navBalance">—</span></div>
</nav>

<main class="container page">

  <h1 style="font-size:1.3rem;font-weight:800;margin-bottom:1.25rem;">👥 Amigos</h1>

  <!-- Búsqueda -->
  <div style="position:relative;margin-bottom:1.5rem;">
    <div class="input-group">
      <input class="form-input" type="text" id="searchInput"
             placeholder="Buscar usuarios por nombre..."
             oninput="onSearch(this.value)"
             autocomplete="off">
      <span class="input-group__suffix" style="font-size:1rem;">🔍</span>
    </div>
    <div id="searchResults" style="display:none;" class="search-results"></div>
  </div>

  <!-- Tabs -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tabFriendsBtn" onclick="showTab('friends', this)">
      👥 Mis amigos <span id="friendsCount" style="color:var(--text-muted);font-weight:400;font-size:0.85rem;"></span>
    </button>
    <button class="tab-btn" id="tabRequestsBtn" onclick="showTab('requests', this)">
      📬 Solicitudes
      <span id="requestsBadge"
            style="display:none;background:var(--red-accent);color:#fff;
                   border-radius:99px;padding:1px 7px;font-size:0.72rem;margin-left:4px;">
        0
      </span>
    </button>
  </div>

  <!-- Tab: Amigos -->
  <div id="tabFriends">
    <div id="friendsList">
      <div style="text-align:center;padding:1.5rem;color:var(--text-muted);">
        <div class="loading-spinner" style="margin:0 auto 0.75rem;"></div>
        Cargando...
      </div>
    </div>
  </div>

  <!-- Tab: Solicitudes -->
  <div id="tabRequests" style="display:none;">
    <div id="requestsList">
      <div style="text-align:center;padding:1.5rem;color:var(--text-muted);">
        <div class="loading-spinner" style="margin:0 auto 0.75rem;"></div>
        Cargando...
      </div>
    </div>
  </div>

</main>

<script src="../js/api.js"></script>
<script src="../js/navbar.js"></script>
<script>
  requireLogin();

  let searchDebounce = null;

  // ── Tabs ──────────────────────────────────────────────────────────────
  function showTab(tab, el) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('tabFriends').style.display   = tab === 'friends'  ? 'block' : 'none';
    document.getElementById('tabRequests').style.display  = tab === 'requests' ? 'block' : 'none';
    if (tab === 'friends')  loadFriends();
    if (tab === 'requests') loadRequests();
  }

  // ── Búsqueda de usuarios ──────────────────────────────────────────────
  function onSearch(val) {
    clearTimeout(searchDebounce);
    const results = document.getElementById('searchResults');

    if (!val || val.trim().length < 2) {
      results.style.display = 'none';
      return;
    }

    searchDebounce = setTimeout(async () => {
      try {
        const data = await VB.friends.search(val.trim());
        renderSearchResults(data.users || []);
      } catch (err) {
        results.style.display = 'none';
        console.error('Search error:', err.message);
      }
    }, 350);
  }

  function renderSearchResults(users) {
    const results = document.getElementById('searchResults');

    if (!users.length) {
      results.style.display = 'block';
      results.innerHTML = `
        <div style="padding:12px 16px;color:var(--text-muted);font-size:0.88rem;text-align:center;">
          No se encontraron usuarios
        </div>`;
      return;
    }

    results.style.display = 'block';
    results.innerHTML = users.map(u => {
      let actionHtml = '';

      if (u.relationStatus === 'friends') {
        actionHtml = `<span class="rel-badge rel-friends">✓ Amigos</span>`;
      } else if (u.relationStatus === 'pending_sent') {
        actionHtml = `<span class="rel-badge rel-pending-sent">⏳ Solicitud enviada</span>`;
      } else if (u.relationStatus === 'pending_received') {
        actionHtml = `
          <div style="display:flex;gap:6px;">
            <button class="btn btn--green btn--sm"
              onclick="respondRequest('${u.friendshipId}', 'accept', this, '${u.id}')">
              ✓ Aceptar
            </button>
            <button class="btn btn--ghost btn--sm"
              onclick="respondRequest('${u.friendshipId}', 'reject', this, '${u.id}')">
              ✕
            </button>
          </div>`;
      } else {
        actionHtml = `
          <button class="btn btn--primary btn--sm"
            onclick="sendFriendRequest('${u.id}', this)">
            + Agregar
          </button>`;
      }

      return `
        <div class="search-result-row">
          <div style="display:flex;align-items:center;gap:10px;min-width:0;">
            <div class="avatar-sm" style="width:36px;height:36px;font-size:1.1rem;">${u.avatarEmoji || '🎰'}</div>
            <div style="min-width:0;">
              <div style="font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                ${u.username}
              </div>
              <div style="font-size:0.72rem;color:var(--text-muted);">
                Miembro desde ${new Date(u.createdAt).toLocaleDateString('es-CR')}
              </div>
            </div>
          </div>
          ${actionHtml}
        </div>`;
    }).join('');
  }

  // Cierra resultados al hacer click afuera
  document.addEventListener('click', (e) => {
    if (!e.target.closest('#searchInput') && !e.target.closest('.search-results')) {
      document.getElementById('searchResults').style.display = 'none';
    }
  });

  // ── Enviar solicitud ──────────────────────────────────────────────────
  async function sendFriendRequest(addresseeId, btn) {
    btn.disabled = true;
    btn.textContent = '...';
    try {
      const data = await VB.friends.sendRequest({ addresseeId });
      showToast(data.message, 'success');
      btn.className   = 'rel-badge rel-pending-sent';
      btn.textContent = '⏳ Solicitud enviada';
      btn.style.border = 'none';
    } catch (err) {
      showToast(err.message, 'error');
      btn.disabled = false;
      btn.textContent = '+ Agregar';
    }
  }

  // ── Responder solicitud ───────────────────────────────────────────────
  async function respondRequest(friendshipId, action, btn, userId) {
    btn.disabled = true;
    try {
      const data = await VB.friends.respondRequest({ friendshipId, action });
      showToast(data.message, 'success');

      // Refresca resultados de búsqueda y solicitudes
      document.getElementById('searchResults').style.display = 'none';
      document.getElementById('searchInput').value = '';
      loadFriends();
      loadRequests();
    } catch (err) {
      showToast(err.message, 'error');
      btn.disabled = false;
    }
  }

  // ── Cargar amigos ─────────────────────────────────────────────────────
  async function loadFriends() {
    const el = document.getElementById('friendsList');
    el.innerHTML = `
      <div style="text-align:center;padding:1.5rem;color:var(--text-muted);">
        <div class="loading-spinner" style="margin:0 auto 0.75rem;"></div>
        Cargando...
      </div>`;

    try {
      const data = await VB.friends.list();
      const friends = data.friends || [];

      document.getElementById('friendsCount').textContent = `(${friends.length})`;

      if (!friends.length) {
        el.innerHTML = `
          <div class="empty-state">
            <div class="icon">👤</div>
            <div style="font-weight:600;margin-bottom:4px;">Sin amigos aún</div>
            <div style="font-size:0.88rem;">Buscá usuarios arriba y enviá solicitudes</div>
          </div>`;
        return;
      }

      el.innerHTML = friends.map(f => `
        <div class="friend-card">
          <div style="display:flex;align-items:center;gap:10px;min-width:0;flex:1;">
            <div class="avatar-sm">${f.friend.avatarEmoji || '🎰'}</div>
            <div style="min-width:0;">
              <div style="font-weight:700;">${f.friend.username}</div>
              <div style="font-size:0.75rem;color:var(--text-muted);">
                Amigos desde ${new Date(f.since).toLocaleDateString('es-CR')}
              </div>
            </div>
          </div>
          <div style="display:flex;gap:6px;align-items:center;flex-shrink:0;">
            <button class="btn btn--primary btn--sm"
              onclick="window.location.href='./p2p.html?friendId=${f.friend.id}&friendName=${encodeURIComponent(f.friend.username)}'">
              🎲 Apostar juntos
            </button>
            <button class="btn btn--ghost btn--sm" style="color:var(--red-accent);"
              onclick="removeFriend('${f.friendshipId}', '${f.friend.username}')">
              ✕
            </button>
          </div>
        </div>
      `).join('');

    } catch (err) {
      console.error('loadFriends error:', err);
      el.innerHTML = `
        <div class="card" style="text-align:center;color:var(--text-muted);padding:1.5rem;">
          Error al cargar: ${err.message}
        </div>`;
    }
  }

  // ── Cargar solicitudes pendientes ─────────────────────────────────────
  async function loadRequests() {
    const el = document.getElementById('requestsList');
    el.innerHTML = `
      <div style="text-align:center;padding:1.5rem;color:var(--text-muted);">
        <div class="loading-spinner" style="margin:0 auto 0.75rem;"></div>
        Cargando solicitudes...
      </div>`;

    try {
      const data = await VB.friends.requests();
      const requests = data.requests || [];

      // Actualiza badge en la pestaña
      const badge = document.getElementById('requestsBadge');
      if (requests.length > 0) {
        badge.textContent   = requests.length;
        badge.style.display = 'inline';
      } else {
        badge.style.display = 'none';
      }

      if (!requests.length) {
        el.innerHTML = `
          <div class="empty-state">
            <div class="icon">📬</div>
            <div style="font-weight:600;margin-bottom:4px;">Sin solicitudes pendientes</div>
            <div style="font-size:0.88rem;">Cuando alguien te envíe una solicitud, aparecerá aquí</div>
          </div>`;
        return;
      }

      el.innerHTML = requests.map(r => `
        <div class="request-card">
          <div style="display:flex;align-items:center;gap:10px;min-width:0;flex:1;">
            <div class="avatar-sm">${r.requester.avatarEmoji || '🎰'}</div>
            <div>
              <div style="font-weight:700;">${r.requester.username}</div>
              <div style="font-size:0.75rem;color:var(--text-muted);">
                Hace ${timeSince(r.createdAt)}
              </div>
            </div>
          </div>
          <div class="request-actions">
            <button class="btn btn--green btn--sm"
              onclick="respondRequest('${r.id}', 'accept', this)">
              ✓ Aceptar
            </button>
            <button class="btn btn--ghost btn--sm"
              onclick="respondRequest('${r.id}', 'reject', this)">
              ✕ Rechazar
            </button>
          </div>
        </div>
      `).join('');

    } catch (err) {
      console.error('loadRequests error:', err);
      el.innerHTML = `
        <div class="card" style="text-align:center;color:var(--text-muted);padding:1.5rem;">
          Error al cargar solicitudes: ${err.message}
        </div>`;
    }
  }

  // ── Eliminar amigo ────────────────────────────────────────────────────
  async function removeFriend(friendshipId, username) {
    if (!confirm(`¿Eliminar a ${username} de tus amigos?`)) return;
    try {
      await VB.friends.remove({ friendshipId });
      showToast(`${username} eliminado`, 'info');
      loadFriends();
    } catch (err) {
      showToast(err.message, 'error');
    }
  }

  // ── Helper: tiempo relativo ───────────────────────────────────────────
  function timeSince(dateStr) {
    const diff = Date.now() - new Date(dateStr).getTime();
    const m = Math.floor(diff / 60000);
    const h = Math.floor(diff / 3600000);
    const d = Math.floor(diff / 86400000);
    if (d > 0) return d + (d === 1 ? ' día' : ' días');
    if (h > 0) return h + (h === 1 ? ' hora' : ' horas');
    if (m > 0) return m + ' min';
    return 'ahora';
  }

  // ── Init ──────────────────────────────────────────────────────────────
  loadFriends();
  loadRequests(); // Carga en paralelo para el badge
</script>
</body>
</html>

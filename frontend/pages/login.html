<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VirtualBet — Iniciar sesión</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-card animate-slide-up">

    <div class="auth-card__title">🎰 VirtualBet</div>
    <div class="auth-card__subtitle">Iniciá sesión para jugar</div>

    <form class="auth-card__form" id="loginForm">

      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input
          class="form-input"
          type="email"
          id="email"
          placeholder="tu@email.com"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <input
          class="form-input"
          type="password"
          id="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      <div id="errorMsg" style="color:#fca5a5;font-size:0.85rem;display:none;"></div>

      <button type="submit" class="btn btn--primary btn--full btn--lg" id="submitBtn">
        Iniciar sesión
      </button>

    </form>

    <div class="auth-card__footer">
      ¿No tenés cuenta?
      <a href="./register.html">Registrate gratis</a>
    </div>

  </div>
</div>

<script src="../js/api.js"></script>
<script>
  // Si ya está logueado, redirige
  if (Auth.isLoggedIn()) {
    window.location.href = './dashboard.html';
  }

  const form      = document.getElementById('loginForm');
  const submitBtn = document.getElementById('submitBtn');
  const errorMsg  = document.getElementById('errorMsg');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorMsg.style.display = 'none';

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    submitBtn.disabled     = true;
    submitBtn.textContent  = 'Iniciando sesión...';

    try {
      const data = await VB.auth.login({ email, password });

      // Guarda sesión
      Auth.setSession(data.token, data.user);

      // Redirige según rol
      if (data.user.role === 'ADMIN') {
        window.location.href = './admin.html';
      } else {
        window.location.href = './dashboard.html';
      }

    } catch (err) {
      errorMsg.textContent    = err.message;
      errorMsg.style.display  = 'block';
      submitBtn.disabled      = false;
      submitBtn.textContent   = 'Iniciar sesión';
    }
  });
</script>

</body>
</html>

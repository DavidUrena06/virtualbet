<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VirtualBet — Apuestas con amigos</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .p2p-card {
      background:var(--bg-card); border:1px solid var(--border);
      border-radius:var(--radius-lg); padding:1.25rem;
      margin-bottom:0.75rem; transition:all 0.15s; cursor:pointer;
    }
    .p2p-card:hover { border-color:var(--border-hover); transform:translateY(-1px); }

    .status-pill {
      display:inline-block; padding:3px 10px; border-radius:99px;
      font-size:0.75rem; font-weight:700;
    }
    .status-pill.OPEN     { background:rgba(0,255,136,0.12); color:var(--green-neon); }
    .status-pill.LOCKED   { background:rgba(245,158,11,0.12); color:var(--gold); }
    .status-pill.RESOLVED { background:rgba(124,58,237,0.15); color:var(--purple-light); }
    .status-pill.CANCELLED{ background:rgba(239,68,68,0.12);  color:var(--red-accent); }

    .pool-bar {
      height:6px; border-radius:3px; background:var(--border);
      margin-top:8px; overflow:hidden;
    }
    .pool-bar-fill { height:100%; border-radius:3px; background:var(--green-neon); transition:width 0.5s; }

    /* Panel de detalle */
    .detail-panel {
      display:none; position:fixed; top:0; right:0; bottom:0;
      width:min(100%, 480px); background:var(--bg-card);
      border-left:1px solid var(--border); z-index:400;
      overflow-y:auto; padding:1.5rem;
    }
    .detail-panel.open { display:block; animation:slide-in 0.25s ease; }
    @keyframes slide-in {
      from { transform:translateX(100%); }
      to   { transform:translateX(0); }
    }

    .selection-pill {
      display:inline-block; padding:4px 12px; border-radius:99px;
      font-size:0.8rem; font-weight:700; margin-right:4px;
    }
    .sel-HOME { background:rgba(59,130,246,0.15); color:#60a5fa; }
    .sel-DRAW { background:rgba(245,158,11,0.15);  color:var(--gold); }
    .sel-AWAY { background:rgba(239,68,68,0.15);   color:var(--red-accent); }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="../dashboard.html" class="navbar__logo" style="font-size:1rem;">← VirtualBet</a>
  <div style="font-size:1.1rem;font-weight:800;">🤝 Apuestas P2P</div>
  <div class="navbar__balance">🪙 <span id="navBalance">—</span> BC</div>
</nav>

<main class="container page">

  <!-- Stats -->
  <div class="stats-grid" style="margin-bottom:1.5rem;">
    <div class="stat-card">
      <div class="stat-card__label">BC disponibles</div>
      <div class="stat-card__value stat-card__value--green" id="balanceDisplay">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__label">BC bloqueados</div>
      <div class="stat-card__value stat-card__value--gold" id="lockedDisplay">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__label">P2P activas</div>
      <div class="stat-card__value stat-card__value--purple" id="activeP2P">—</div>
    </div>
  </div>

  <!-- Botón crear nueva apuesta -->
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
    <h2 style="font-size:1.1rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px;">
      Mis apuestas P2P
    </h2>
    <button class="btn btn--orange" onclick="window.location.href='./sports.html'">
      ⚽ Crear desde partido →
    </button>
  </div>

  <!-- Filtros -->
  <div style="display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;">
    <button class="league-tab active" onclick="setFilter('')">Todas</button>
    <button class="league-tab" onclick="setFilter('OPEN')">Abiertas</button>
    <button class="league-tab" onclick="setFilter('LOCKED')">Bloqueadas</button>
    <button class="league-tab" onclick="setFilter('RESOLVED')">Resueltas</button>
  </div>
  <style>
    .league-tab { padding:6px 14px; border-radius:99px; font-size:0.82rem; font-weight:600;
      border:1px solid var(--border); background:var(--bg-secondary);
      color:var(--text-secondary); cursor:pointer; transition:all 0.15s; }
    .league-tab:hover { border-color:var(--border-hover); color:var(--text-primary); }
    .league-tab.active { background:rgba(124,58,237,0.15); border-color:var(--purple); color:var(--purple-light); }
  </style>

  <!-- Lista de apuestas -->
  <div id="p2pList">
    <div style="text-align:center;padding:2rem;color:var(--text-muted);">Cargando...</div>
  </div>

</main>

<!-- Panel de detalle de apuesta -->
<div class="detail-panel" id="detailPanel">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
    <h3 style="font-size:1.1rem;font-weight:700;" id="detailTitle">—</h3>
    <button onclick="document.getElementById('detailPanel').classList.remove('open')"
            style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1.2rem;">✕</button>
  </div>

  <div id="detailContent">—</div>

  <div id="detailActions" style="margin-top:1.5rem;"></div>
</div>

<script src="../js/api.js"></script>
<script>
  requireLogin();

  let currentFilter  = '';
  let currentBalance = 0;
  let lockedBalance  = 0;

  async function init() {
    try {
      const d = await VB.wallet.balance();
      currentBalance = parseFloat(d.wallet.balance);
      lockedBalance  = parseFloat(d.wallet.lockedBalance || 0);
      const available = currentBalance - lockedBalance;

      document.getElementById('navBalance').textContent =
        available.toLocaleString('es-CR', { minimumFractionDigits: 2 });
      document.getElementById('balanceDisplay').textContent = available.toFixed(2) + ' BC';
      document.getElementById('lockedDisplay').textContent  = lockedBalance.toFixed(2) + ' BC';
    } catch(e) {}

    loadP2P();
  }

  function setFilter(status) {
    currentFilter = status;
    document.querySelectorAll('.league-tab').forEach(b => {
      const label = b.textContent.trim();
      const match = (!status && label === 'Todas') ||
        (status === 'OPEN'     && label === 'Abiertas') ||
        (status === 'LOCKED'   && label === 'Bloqueadas') ||
        (status === 'RESOLVED' && label === 'Resueltas');
      b.classList.toggle('active', match);
    });
    loadP2P();
  }

  async function loadP2P() {
    const container = document.getElementById('p2pList');
    try {
      const data = await VB.p2p.myBets(currentFilter);
      const { participations } = data;

      const active = participations.filter(p => p.privateBet.status === 'OPEN' || p.privateBet.status === 'LOCKED');
      document.getElementById('activeP2P').textContent = active.length;

      if (!participations.length) {
        container.innerHTML = `
          <div class="card" style="text-align:center;padding:2.5rem;">
            <div style="font-size:2.5rem;margin-bottom:0.75rem;">🤝</div>
            <div style="font-weight:700;margin-bottom:0.5rem;">Sin apuestas P2P</div>
            <div style="color:var(--text-secondary);font-size:0.9rem;margin-bottom:1.5rem;">
              Creá una apuesta privada con tus amigos desde la sección Deportes
            </div>
            <button class="btn btn--orange" onclick="window.location.href='./sports.html'">
              ⚽ Ver partidos
            </button>
          </div>`;
        return;
      }

      const selLabel = s => ({ HOME: 'Local', DRAW: 'Empate', AWAY: 'Visita' }[s] || s);
      const selClass = s => ({ HOME: 'sel-HOME', DRAW: 'sel-DRAW', AWAY: 'sel-AWAY' }[s] || '');

      container.innerHTML = participations.map(p => {
        const bet  = p.privateBet;
        const m    = bet.match;
        const pool = parseFloat(bet.totalPool);
        const maxPool = parseFloat(bet.minAmount) * bet.maxParticipants;
        const pct  = Math.min((pool / maxPool) * 100, 100);

        return `
          <div class="p2p-card" onclick="loadDetail('${bet.id}')">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
              <div>
                <div style="font-weight:700;font-size:1rem;margin-bottom:2px;">${bet.title}</div>
                <div style="font-size:0.8rem;color:var(--text-muted);">
                  ${m.teamHome} vs ${m.teamAway} · ${m.league}
                </div>
              </div>
              <span class="status-pill ${bet.status}">${
                {OPEN:'Abierta',LOCKED:'Bloqueada',RESOLVED:'Resuelta',CANCELLED:'Cancelada'}[bet.status]
              }</span>
            </div>

            <div style="display:flex;gap:12px;align-items:center;">
              <div>
                <div style="font-size:0.7rem;color:var(--text-muted);">Tu selección</div>
                <span class="selection-pill ${selClass(p.selection)}">${selLabel(p.selection)}</span>
              </div>
              <div>
                <div style="font-size:0.7rem;color:var(--text-muted);">Tu apuesta</div>
                <div style="font-weight:700;color:var(--gold);">${parseFloat(p.amount).toFixed(2)} BC</div>
              </div>
              <div>
                <div style="font-size:0.7rem;color:var(--text-muted);">Pool total</div>
                <div style="font-weight:700;color:var(--green-neon);">${pool.toFixed(2)} BC</div>
              </div>
              ${p.status === 'WON' ? `
              <div>
                <div style="font-size:0.7rem;color:var(--text-muted);">Ganaste</div>
                <div style="font-weight:800;color:var(--green-neon);">+${parseFloat(p.payout).toFixed(2)} BC</div>
              </div>` : ''}
            </div>

            <div class="pool-bar">
              <div class="pool-bar-fill" style="width:${pct}%;"></div>
            </div>
            <div style="font-size:0.72rem;color:var(--text-muted);margin-top:3px;text-align:right;">
              ${bet._count?.participants || 1} participante${(bet._count?.participants || 1) !== 1 ? 's' : ''}
              · creado por ${bet.creator.username}
            </div>
          </div>`;
      }).join('');
    } catch (err) {
      container.innerHTML = '<div class="card" style="color:var(--text-muted);text-align:center;">Error al cargar apuestas</div>';
    }
  }

  // ── Panel de detalle ──────────────────────────────────────────────────
  async function loadDetail(id) {
    const panel = document.getElementById('detailPanel');
    panel.classList.add('open');
    document.getElementById('detailContent').innerHTML = '<div style="text-align:center;padding:2rem;color:var(--text-muted);">Cargando...</div>';
    document.getElementById('detailActions').innerHTML = '';

    try {
      const { bet } = await VB.p2p.get(id);
      document.getElementById('detailTitle').textContent = bet.title;

      const selLabel = s => ({ HOME: bet.match.teamHome, DRAW: 'Empate', AWAY: bet.match.teamAway }[s]);
      const selClass = s => ({ HOME: 'sel-HOME', DRAW: 'sel-DRAW', AWAY: 'sel-AWAY' }[s] || '');

      const pool    = parseFloat(bet.totalPool);
      const dist    = parseFloat(bet.distributable);
      const comm    = parseFloat(bet.commission);

      document.getElementById('detailContent').innerHTML = `
        <div style="background:var(--bg-secondary);border-radius:var(--radius-lg);padding:1rem;margin-bottom:1rem;">
          <div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:4px;">${bet.match.league}</div>
          <div style="font-weight:700;font-size:1.05rem;">${bet.match.teamHome} vs ${bet.match.teamAway}</div>
          <div style="font-size:0.8rem;color:var(--text-secondary);margin-top:2px;">
            ${bet.status === 'UPCOMING' ? '⏰ ' + timeUntil(bet.match.startsAt) : bet.match.result || bet.status}
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem;">
          <div style="background:var(--bg-secondary);border-radius:var(--radius-md);padding:10px;text-align:center;">
            <div style="font-size:0.7rem;color:var(--text-muted);">POOL TOTAL</div>
            <div style="font-weight:800;color:var(--green-neon);">${pool.toFixed(2)} BC</div>
          </div>
          <div style="background:var(--bg-secondary);border-radius:var(--radius-md);padding:10px;text-align:center;">
            <div style="font-size:0.7rem;color:var(--text-muted);">DISTRIBUIBLE (−5%)</div>
            <div style="font-weight:800;color:var(--gold);">${dist.toFixed(2)} BC</div>
          </div>
        </div>

        <div style="font-size:0.85rem;font-weight:600;color:var(--text-secondary);margin-bottom:8px;">
          Participantes (${bet.participants.length})
        </div>

        ${bet.participants.map(p => `
          <div style="display:flex;align-items:center;justify-content:space-between;
                      padding:8px 0;border-bottom:1px solid var(--border);">
            <div style="display:flex;align-items:center;gap:8px;">
              <span>${p.user.avatarEmoji}</span>
              <span style="font-weight:600;">${p.user.username}</span>
              <span class="selection-pill ${selClass(p.selection)}" style="font-size:0.72rem;">
                ${selLabel(p.selection)}
              </span>
            </div>
            <div style="text-align:right;">
              <div style="font-weight:700;">${parseFloat(p.amount).toFixed(2)} BC</div>
              ${p.status === 'WON' ? `<div style="font-size:0.78rem;color:var(--green-neon);">+${parseFloat(p.payout).toFixed(2)} BC</div>` : ''}
              ${p.status === 'LOST' ? `<div style="font-size:0.78rem;color:var(--red-accent);">Perdió</div>` : ''}
            </div>
          </div>
        `).join('')}
      `;

      // Acciones según estado
      const actionsEl = document.getElementById('detailActions');
      const myUser = Auth.getUser();
      const isCreator = bet.creator.username === myUser.username;

      if (bet.status === 'OPEN') {
        // Ver si ya estoy dentro
        const alreadyIn = bet.participants.some(p => p.user.username === myUser.username);

        if (!alreadyIn) {
          actionsEl.innerHTML = `
            <div style="font-weight:600;margin-bottom:8px;color:var(--text-secondary);">Unirse a esta apuesta</div>
            <div style="display:flex;gap:8px;margin-bottom:8px;">
              <button class="odd-btn" onclick="setJoinSelection('HOME')" id="joinHome">
                <div class="odd-label">Local</div>
                <div style="font-weight:700;">${bet.match.teamHome}</div>
              </button>
              <button class="odd-btn" onclick="setJoinSelection('DRAW')" id="joinDraw">
                <div class="odd-label">Empate</div>
                <div style="font-weight:700;">X</div>
              </button>
              <button class="odd-btn" onclick="setJoinSelection('AWAY')" id="joinAway">
                <div class="odd-label">Visita</div>
                <div style="font-weight:700;">${bet.match.teamAway}</div>
              </button>
            </div>
            <div class="input-group" style="margin-bottom:8px;">
              <input class="form-input" type="number" id="joinAmount"
                     min="${bet.minAmount}" value="${bet.minAmount}" step="1">
              <span class="input-group__suffix">BC</span>
            </div>
            <button class="btn btn--orange btn--full" onclick="joinBet('${bet.id}')">
              🤝 Unirme
            </button>
          `;
          window._joinSelection = null;
        } else if (isCreator) {
          actionsEl.innerHTML = `
            <button class="btn btn--ghost btn--full" style="color:var(--red-accent);"
              onclick="cancelBet('${bet.id}')">
              ✕ Cancelar apuesta
            </button>`;
        }
      }
    } catch (err) {
      document.getElementById('detailContent').innerHTML =
        `<div style="color:var(--text-muted);">Error al cargar: ${err.message}</div>`;
    }
  }

  function setJoinSelection(sel) {
    window._joinSelection = sel;
    ['Home','Draw','Away'].forEach(x => {
      document.getElementById('join'+x)?.classList.remove('selected');
    });
    document.getElementById('join'+sel.charAt(0)+sel.slice(1).toLowerCase())?.classList.add('selected');
  }

  // Arreglo en el HTML: los IDs son joinHome, joinDraw, joinAway
  function setJoinSelection(sel) {
    window._joinSelection = sel;
    ['joinHome','joinDraw','joinAway'].forEach(id => {
      document.getElementById(id)?.classList.remove('selected');
    });
    const idMap = { HOME:'joinHome', DRAW:'joinDraw', AWAY:'joinAway' };
    document.getElementById(idMap[sel])?.classList.add('selected');
  }

  async function joinBet(privateBetId) {
    if (!window._joinSelection) { showToast('Elegí una selección', 'error'); return; }
    const amount = parseFloat(document.getElementById('joinAmount').value);
    if (!amount || amount < 1) { showToast('Monto inválido', 'error'); return; }

    try {
      const data = await VB.p2p.join({ privateBetId, selection: window._joinSelection, amount });
      showToast(data.message, 'success');
      document.getElementById('detailPanel').classList.remove('open');
      loadP2P();
      init();
    } catch (err) {
      showToast(err.message, 'error');
    }
  }

  async function cancelBet(privateBetId) {
    if (!confirm('¿Cancelar la apuesta? Todos los participantes serán reembolsados.')) return;
    try {
      const data = await VB.p2p.cancel({ privateBetId });
      showToast(data.message, 'success');
      document.getElementById('detailPanel').classList.remove('open');
      loadP2P();
      init();
    } catch (err) {
      showToast(err.message, 'error');
    }
  }

  // Cierra el panel haciendo click afuera
  document.addEventListener('click', (e) => {
    const panel = document.getElementById('detailPanel');
    if (panel.classList.contains('open') && !panel.contains(e.target) && !e.target.closest('.p2p-card')) {
      panel.classList.remove('open');
    }
  });

  init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VirtualBet — Ruleta</title>
  <link rel="stylesheet" href="../../css/main.css">
  <style>
    #rouletteCanvas {
      display: block;
      margin: 0 auto;
      border-radius: 50%;
      border: 3px solid var(--border);
    }

    /* ── Tablero de apuestas ─────────────────────────────────────── */
    .bet-table {
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 1.5rem;
    }
    .bet-table-title {
      background: var(--bg-secondary);
      padding: 8px 12px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
    }
    .bet-options {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 12px;
    }
    .bet-chip {
      padding: 6px 14px;
      border-radius: 99px;
      border: 1px solid var(--border);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      background: var(--bg-secondary);
      color: var(--text-secondary);
    }
    .bet-chip:hover { border-color: var(--border-hover); color: var(--text-primary); }
    .bet-chip.selected {
      background: rgba(124,58,237,0.2);
      border-color: var(--purple);
      color: var(--purple-light);
    }
    .bet-chip.red-chip    { border-color: #ef4444; color: #ef4444; }
    .bet-chip.red-chip.selected  { background: rgba(239,68,68,0.2); }
    .bet-chip.black-chip  { border-color: #9ca3af; color: #9ca3af; }
    .bet-chip.black-chip.selected { background: rgba(156,163,175,0.2); }
    .bet-chip.green-chip  { border-color: var(--green-dim); color: var(--green-dim); }
    .bet-chip.green-chip.selected { background: rgba(0,204,106,0.2); }

    /* ── Números en grid ─────────────────────────────────────────── */
    .numbers-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 4px;
      padding: 12px;
    }
    .num-chip {
      aspect-ratio: 1;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s ease;
      border: 2px solid transparent;
    }
    .num-chip:hover   { transform: scale(1.15); border-color: var(--purple-light); }
    .num-chip.selected { border-color: var(--purple-light); transform: scale(1.15);
                         box-shadow: 0 0 8px var(--purple); }
    .num-chip.zero    { background: #166534; color: #fff; grid-column: span 6; border-radius: var(--radius-sm); aspect-ratio: auto; padding: 6px; }
    .num-chip.red     { background: #991b1b; color: #fff; }
    .num-chip.black   { background: #1f2937; color: #fff; border: 1px solid #374151; }

    /* ── Info de pago ──────────────────────────────────────────────── */
    .payout-info {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: 4px;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="./dashboard.html" class="navbar__logo">🎰 VirtualBet</a>
  <div class="navbar__nav"></div>  <!-- navbar.js lo llena automáticamente -->
  <div class="navbar__balance">🪙 <span id="navBalance">—</span></div>
</nav>

<main class="container page">
  <div class="game-area">

    <!-- Rueda animada -->
    <div style="text-align:center;margin-bottom:1rem;position:relative;">
      <canvas id="rouletteCanvas" width="260" height="260"></canvas>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
                  background:var(--bg-primary);border-radius:50%;width:70px;height:70px;
                  display:flex;align-items:center;justify-content:center;
                  font-size:1.5rem;font-weight:900;border:3px solid var(--border);"
           id="wheelCenter">🎡</div>
      <!-- Marcador -->
      <div style="position:absolute;top:calc(50% - 130px);left:50%;transform:translateX(-50%);
                  width:0;height:0;border-left:8px solid transparent;
                  border-right:8px solid transparent;border-top:20px solid var(--red-accent);">
      </div>
    </div>

    <!-- Resultado -->
    <div class="result-display" id="resultDisplay" style="margin-bottom:1.5rem;">
      <div style="color:var(--text-muted);">Elegí una apuesta y girá</div>
    </div>

    <!-- Tablero de apuestas -->
    <div class="bet-table">
      <div class="bet-table-title">Selección de apuesta</div>

      <!-- Colores -->
      <div style="padding:4px 12px 0;font-size:0.75rem;font-weight:700;
                  text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);">
        Color (1:1)
      </div>
      <div class="bet-options">
        <div class="bet-chip red-chip" onclick="selectBet('color','red')" id="bet-color-red">
          🔴 Rojo
        </div>
        <div class="bet-chip black-chip" onclick="selectBet('color','black')" id="bet-color-black">
          ⚫ Negro
        </div>
      </div>

      <!-- Par / Impar -->
      <div style="padding:4px 12px 0;font-size:0.75rem;font-weight:700;
                  text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);">
        Par / Impar (1:1)
      </div>
      <div class="bet-options">
        <div class="bet-chip" onclick="selectBet('parity','even')" id="bet-parity-even">Par</div>
        <div class="bet-chip" onclick="selectBet('parity','odd')"  id="bet-parity-odd">Impar</div>
      </div>

      <!-- Mitad -->
      <div style="padding:4px 12px 0;font-size:0.75rem;font-weight:700;
                  text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);">
        Mitad (1:1)
      </div>
      <div class="bet-options">
        <div class="bet-chip" onclick="selectBet('half','low')"  id="bet-half-low">1-18</div>
        <div class="bet-chip" onclick="selectBet('half','high')" id="bet-half-high">19-36</div>
      </div>

      <!-- Docenas -->
      <div style="padding:4px 12px 0;font-size:0.75rem;font-weight:700;
                  text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);">
        Docena (2:1)
      </div>
      <div class="bet-options">
        <div class="bet-chip" onclick="selectBet('dozen','1')" id="bet-dozen-1">1ª (1-12)</div>
        <div class="bet-chip" onclick="selectBet('dozen','2')" id="bet-dozen-2">2ª (13-24)</div>
        <div class="bet-chip" onclick="selectBet('dozen','3')" id="bet-dozen-3">3ª (25-36)</div>
      </div>

      <!-- Números -->
      <div style="padding:4px 12px 0;font-size:0.75rem;font-weight:700;
                  text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);">
        Número exacto (35:1)
      </div>
      <div class="numbers-grid" id="numbersGrid"></div>
    </div>

    <!-- Apuesta seleccionada -->
    <div style="background:var(--bg-secondary);border-radius:var(--radius-md);
                padding:10px 14px;margin-bottom:1rem;font-size:0.9rem;
                color:var(--text-secondary);min-height:40px;"
         id="selectedBetLabel">
      No hay apuesta seleccionada
    </div>

    <!-- Controles -->
    <div class="bet-controls">
      <div class="form-group">
        <label class="form-label">Apuesta</label>
        <div class="input-group">
          <input class="form-input" type="number" id="betAmount"
                 min="1" max="10000" value="10" step="1">
          <span class="input-group__suffix">🪙</span>
        </div>
        <div class="multiplier-presets" style="margin-top:8px;">
          <button onclick="setBet(10)">10</button>
          <button onclick="setBet(50)">50</button>
          <button onclick="setBet(100)">100</button>
          <button onclick="setBet(500)">500</button>
          <button onclick="setHalfBet()">½</button>
          <button onclick="setMaxBet()">MAX</button>
        </div>
      </div>

      <button class="btn btn--orange btn--full btn--lg" id="spinBtn" onclick="spinWheel()">
        🎡 Girar la ruleta
      </button>
    </div>
  </div>
</main>

<script src="../../js/api.js"></script>
<script src="../js/navbar.js"></script>
<script>
  requireLogin();

  const REDS   = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
  // Orden de la ruleta europea
  const WHEEL_ORDER = [0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26];
  const NUM_COLORS  = n => n === 0 ? '#166534' : REDS.includes(n) ? '#991b1b' : '#1f2937';

  let selectedBetType  = null;
  let selectedBetValue = null;
  let currentBalance   = 0;
  let wheelAngle       = 0;
  let spinning         = false;

  const canvas = document.getElementById('rouletteCanvas');
  const ctx    = canvas.getContext('2d');
  const R      = 124; // radio

  // ── Dibuja la rueda ───────────────────────────────────────────────────────
  function drawWheel(angle = 0) {
    const cx = canvas.width  / 2;
    const cy = canvas.height / 2;
    const n  = WHEEL_ORDER.length;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < n; i++) {
      const start = angle + (i / n) * Math.PI * 2 - Math.PI / 2;
      const end   = angle + ((i + 1) / n) * Math.PI * 2 - Math.PI / 2;
      const num   = WHEEL_ORDER[i];

      // Sector
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, R, start, end);
      ctx.closePath();
      ctx.fillStyle = NUM_COLORS(num);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth   = 0.5;
      ctx.stroke();

      // Número
      const mid = (start + end) / 2;
      const tx  = cx + (R * 0.75) * Math.cos(mid);
      const ty  = cy + (R * 0.75) * Math.sin(mid);
      ctx.save();
      ctx.translate(tx, ty);
      ctx.rotate(mid + Math.PI / 2);
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 9px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(num, 0, 0);
      ctx.restore();
    }

    // Círculo interior
    ctx.beginPath();
    ctx.arc(cx, cy, 36, 0, Math.PI * 2);
    ctx.fillStyle = 'var(--bg-primary)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // ── Anima la rueda hacia un número destino ────────────────────────────────
  function animateToNumber(targetNumber, onDone) {
    const n   = WHEEL_ORDER.length;
    const idx = WHEEL_ORDER.indexOf(targetNumber);
    const targetAngle = -(idx / n) * Math.PI * 2;
    const fullSpins   = Math.PI * 2 * (5 + Math.random() * 3); // 5-8 vueltas

    const startAngle = wheelAngle;
    const endAngle   = targetAngle - fullSpins;
    const duration   = 3500; // ms
    let   startTime  = null;

    function ease(t) {
      // Ease out cubic
      return 1 - Math.pow(1 - t, 3);
    }

    function frame(ts) {
      if (!startTime) startTime = ts;
      const elapsed = ts - startTime;
      const t = Math.min(elapsed / duration, 1);
      wheelAngle = startAngle + (endAngle - startAngle) * ease(t);

      drawWheel(wheelAngle);

      // Número en el centro
      const progress = t < 0.8
        ? WHEEL_ORDER[Math.floor(Math.random() * n)]
        : targetNumber;
      document.getElementById('wheelCenter').textContent = progress;

      if (t < 1) {
        requestAnimationFrame(frame);
      } else {
        wheelAngle = endAngle % (Math.PI * 2);
        document.getElementById('wheelCenter').textContent = targetNumber;
        onDone();
      }
    }
    requestAnimationFrame(frame);
  }

  // ── Construye grid de números ─────────────────────────────────────────────
  function buildNumbersGrid() {
    const grid = document.getElementById('numbersGrid');
    // Cero
    const zero = document.createElement('div');
    zero.className = 'num-chip zero';
    zero.textContent = '0';
    zero.onclick = () => selectBet('number', '0');
    zero.id = 'bet-number-0';
    grid.appendChild(zero);

    // 1-36
    for (let i = 1; i <= 36; i++) {
      const isRed = REDS.includes(i);
      const el    = document.createElement('div');
      el.className = `num-chip ${isRed ? 'red' : 'black'}`;
      el.textContent = i;
      el.id = `bet-number-${i}`;
      el.onclick = () => selectBet('number', String(i));
      grid.appendChild(el);
    }
  }

  // ── Selecciona apuesta ────────────────────────────────────────────────────
  function selectBet(type, value) {
    // Limpia selección anterior
    document.querySelectorAll('.bet-chip, .num-chip').forEach(el => {
      el.classList.remove('selected');
    });

    selectedBetType  = type;
    selectedBetValue = value;

    const id = `bet-${type}-${value}`;
    const el = document.getElementById(id);
    if (el) el.classList.add('selected');

    const labels = {
      'color-red':   '🔴 Rojo — Paga 1:1',
      'color-black': '⚫ Negro — Paga 1:1',
      'parity-even': '2️⃣ Par — Paga 1:1',
      'parity-odd':  '1️⃣ Impar — Paga 1:1',
      'half-low':    '⬇️ Bajo (1-18) — Paga 1:1',
      'half-high':   '⬆️ Alto (19-36) — Paga 1:1',
      'dozen-1':     '1️⃣ 1ª Docena (1-12) — Paga 2:1',
      'dozen-2':     '2️⃣ 2ª Docena (13-24) — Paga 2:1',
      'dozen-3':     '3️⃣ 3ª Docena (25-36) — Paga 2:1',
    };

    const key = `${type}-${value}`;
    const label = type === 'number'
      ? `🎯 Número ${value} — Paga 35:1`
      : labels[key] || key;

    document.getElementById('selectedBetLabel').innerHTML =
      `<strong>Seleccionado:</strong> ${label}`;
  }

  function setBet(n) { document.getElementById('betAmount').value = Math.min(n, 10000); }
  function setHalfBet() {
    const c = parseFloat(document.getElementById('betAmount').value) || 10;
    setBet(Math.max(1, Math.floor(c / 2)));
  }
  function setMaxBet() { setBet(Math.min(currentBalance, 10000)); }

  async function loadBalance() {
    try {
      const d = await VB.wallet.balance();
      currentBalance = parseFloat(d.wallet.balance);
      document.getElementById('navBalance').textContent =
        currentBalance.toLocaleString('es-CR', { minimumFractionDigits: 2 });
    } catch(e) {}
  }

  // ── Gira la ruleta ────────────────────────────────────────────────────────
  async function spinWheel() {
    if (spinning) return;

    if (!selectedBetType) { showToast('Elegí un tipo de apuesta primero', 'error'); return; }

    const betAmount = parseFloat(document.getElementById('betAmount').value);
    if (!betAmount || betAmount < 1)  { showToast('Apuesta mínima: 1 moneda', 'error'); return; }
    if (betAmount > currentBalance)   { showToast('Saldo insuficiente', 'error'); return; }

    const spinBtn = document.getElementById('spinBtn');
    spinBtn.disabled = true;
    spinBtn.textContent = 'Girando...';
    spinning = true;

    document.getElementById('resultDisplay').className = 'result-display';
    document.getElementById('resultDisplay').innerHTML =
      '<div style="color:var(--text-muted);">...</div>';

    try {
      const data = await api.post('/games/roulette', {
        betAmount,
        betType:  selectedBetType,
        betValue: selectedBetValue,
      });

      // Anima la rueda hacia el número real del servidor
      animateToNumber(data.number, () => {
        // Muestra resultado
        const resultEl = document.getElementById('resultDisplay');
        const colorLabel = data.color === 'red' ? '🔴' : data.color === 'black' ? '⚫' : '🟢';

        if (data.result === 'WIN') {
          resultEl.className = 'result-display result-display--win';
          resultEl.innerHTML = `
            <div class="result-display__number" style="color:var(--green-neon);">
              ${colorLabel} ${data.number}
            </div>
            <div class="result-display__label">
              ¡Ganaste ${data.payout.toFixed(2)} 🪙 (x${data.payoutMultiplier})
            </div>
          `;
          showToast(`¡${data.number} ${colorLabel}! +${data.payout.toFixed(2)} 🪙`, 'success');
        } else {
          resultEl.className = 'result-display result-display--loss';
          resultEl.innerHTML = `
            <div class="result-display__number" style="color:var(--red-accent);">
              ${colorLabel} ${data.number}
            </div>
            <div class="result-display__label">
              Perdiste ${betAmount.toFixed(2)} 🪙
            </div>
          `;
          showToast(`${data.number} ${colorLabel} — No fue esta vez`, 'error');
        }

        currentBalance = data.newBalance;
        document.getElementById('navBalance').textContent =
          currentBalance.toLocaleString('es-CR', { minimumFractionDigits: 2 });

        spinning = false;
        spinBtn.disabled = false;
        spinBtn.textContent = '🎡 Girar la ruleta';
      });

    } catch(err) {
      showToast(err.message, 'error');
      spinning = false;
      spinBtn.disabled = false;
      spinBtn.textContent = '🎡 Girar la ruleta';
    }
  }

  loadBalance();
  buildNumbersGrid();
  drawWheel(0);
</script>
</body>
</html>

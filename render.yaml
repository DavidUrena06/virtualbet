# render.yaml
# Configuración de deploy automático en Render
# Subí este archivo a la raíz del repo y Render lo detecta solo

services:
  - type: web
    name: virtualbet-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false        # Lo ponés manualmente en el dashboard de Render
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        sync: false        # URL de tu app en Vercel
      - key: HOUSE_EDGE
        value: "0.03"
      - key: WELCOME_BONUS
        value: "1000"
      - key: RATE_LIMIT_MAX
        value: "100"
      - key: RATE_LIMIT_LOGIN_MAX
        value: "10"
